<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J.A.R.V.I.S — Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0d12;
      --surface:   #111620;
      --border:    #1e2a3a;
      --accent:    #0f62fe;
      --accent2:   #0f62fe;
      --red:       #da1e28;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --radius:    10px;
      --font:      -apple-system, "Segoe UI", system-ui, sans-serif;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 15px; font-weight: 700; letter-spacing: 0.08em;
      color: var(--accent); text-decoration: none;
    }
    .nav-brand .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    .nav-links { display: flex; gap: 6px; }
    .nav-links a {
      padding: 5px 14px; border-radius: 6px; font-size: 13px;
      color: var(--muted); text-decoration: none;
      transition: color .2s, background .2s;
    }
    .nav-links a:hover  { color: var(--text); background: var(--border); }
    .nav-links a.active { color: var(--accent); background: #001133; }

    /* ── MAIN STAGE ── */
    .stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    /* subtle radial glow behind sphere */
    .stage::before {
      content: '';
      position: absolute;
      width: 420px; height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(5,48,173,.10) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── SPHERE ── */
    .sphere-wrap {
      position: relative;
      width: 200px; height: 200px;
      flex-shrink: 0;
    }

    /* rotating outer rings */
    .sphere-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(5,48,173,.30);
    }
    .sphere-ring.r1 { animation: spin1 12s linear infinite; }
    .sphere-ring.r2 {
      inset: 12px;
      border-color: rgba(5,48,173,.18);
      animation: spin1 18s linear infinite reverse;
    }
    @keyframes spin1 { to { transform: rotate(360deg); } }

    /* dashed accent arc */
    .sphere-svg {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
    }
    .sphere-arc {
      animation: spin1 8s linear infinite;
      transform-origin: 100px 100px;
    }

    /* the sphere itself */
    .sphere-core {
      position: absolute;
      inset: 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%,
        #000d2e 0%,
        #060d1e 45%,
        #060d16 100%);
      border: 1px solid rgba(5,48,173,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* inner glow that pulses when speaking */
    .sphere-glow {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at center,
        rgba(5,48,173,.20) 0%,
        transparent 70%);
      opacity: 0;
      transition: opacity .15s;
    }
    .sphere-core.speaking .sphere-glow { opacity: 1; }

    .sphere-label {
      position: relative;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .12em;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(15,98,254,.7);
    }

    /* ── AUDIO METER ── */
    .meter-wrap {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      height: 36px;
      margin-top: 18px;
    }
    .meter-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--accent);
      opacity: .55;
      min-height: 3px;
      transition: height .08s ease;
    }

    /* ── STATUS LINE ── */
    .status-line {
      margin-top: 14px;
      font-size: 12px;
      letter-spacing: .08em;
      color: var(--muted);
      height: 18px;
      text-align: center;
    }
    .status-line.active { color: var(--accent); }

    /* ── RESPONSE PANEL ── */
    .response-panel {
      max-width: 640px;
      width: calc(100% - 48px);
      max-height: 220px;
      overflow-y: auto;
      margin-top: 20px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13.5px;
      line-height: 1.7;
      color: var(--text);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      display: none;
    }
    .response-panel.visible { display: block; }
    .response-panel::-webkit-scrollbar { width: 4px; }
    .response-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* transcript scroll — small history below response */
    .transcript {
      max-width: 640px;
      width: calc(100% - 48px);
      max-height: 100px;
      overflow-y: auto;
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      scrollbar-width: none;
      display: none;
    }
    .transcript.visible { display: block; }
    .transcript::-webkit-scrollbar { display: none; }
    .transcript-entry { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
    .transcript-entry .you    { color: var(--muted); }
    .transcript-entry .jarvis { color: rgba(15,98,254,.8); }

    /* ── MIC BUTTON ── */
    .mic-btn { width: 36px; height: 36px; flex-shrink: 0; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color .2s, border-color .2s, background .2s; }
    .mic-btn svg { width: 16px; height: 16px; }
    .mic-btn:hover { color: var(--text); border-color: var(--accent); }
    .mic-btn.recording { color: #da1e28; border-color: #da1e28; background: rgba(218,30,40,.1); animation: mic-pulse 1s ease-in-out infinite; }
    @keyframes mic-pulse { 0%,100%{ box-shadow: 0 0 0 0 rgba(218,30,40,.4); } 50%{ box-shadow: 0 0 0 6px rgba(218,30,40,0); } }
    .mic-btn.unsupported { opacity: .3; cursor: not-allowed; }

    /* ── INPUT BAR ── */
    .input-bar {
      flex-shrink: 0;
      padding: 16px 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 10px 10px 16px;
      transition: border-color .2s;
      width: 100%;
      max-width: 640px;
    }
    .input-row:focus-within { border-color: var(--accent); }
    .input-row textarea {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: var(--font);
      font-size: 14px; line-height: 1.6; resize: none;
      max-height: 120px; min-height: 24px;
    }
    .input-row textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 36px; height: 36px; flex-shrink: 0;
      border-radius: 8px; border: none;
      background: var(--accent); color: #000;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .1s;
    }
    .send-btn:hover  { background: #0f62fe; }
    .send-btn:active { transform: scale(.94); }
    .send-btn svg { width: 15px; height: 15px; }

    .hint {
      font-size: 11px; color: var(--muted);
      letter-spacing: .03em; text-align: center;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="home.html">
    <span class="dot"></span>
    J.A.R.V.I.S
  </a>
  <div class="nav-links">
    <a href="home.html">Home</a>
    <a href="index.html" class="active">Chat</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="trends.html">Trends</a>
    <a href="esg-checker.html">ESG</a>
  </div>
</nav>

<div class="stage">

  <!-- Sphere -->
  <div class="sphere-wrap">
    <!-- decorative rings -->
    <div class="sphere-ring r1"></div>
    <div class="sphere-ring r2"></div>
    <!-- spinning dashed arc -->
    <svg class="sphere-svg" viewBox="0 0 200 200">
      <g class="sphere-arc">
        <circle cx="100" cy="100" r="96" fill="none"
          stroke="#0f62fe" stroke-width="1"
          stroke-dasharray="28 14" stroke-linecap="round" opacity=".6"/>
      </g>
    </svg>
    <!-- core -->
    <div class="sphere-core" id="sphereCore">
      <div class="sphere-glow"></div>
      <span class="sphere-label">J.A.R.V.I.S</span>
    </div>
  </div>

  <!-- Audio meter (20 bars) -->
  <div class="meter-wrap" id="meter"></div>

  <!-- Status -->
  <div class="status-line" id="statusLine">Awaiting input</div>

  <!-- Latest JARVIS response -->
  <div class="response-panel" id="responsePanel"></div>

  <!-- Compact transcript -->
  <div class="transcript" id="transcript"></div>

</div>

<div class="input-bar">
  <div class="input-row">
    <textarea id="msgInput" rows="1" placeholder="Ask about ESG reports, risks, standards…"></textarea>

    <!-- Mic / voice input -->
    <button class="mic-btn" id="micBtn" title="Hold to speak">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"></rect>
        <path d="M19 10a7 7 0 0 1-14 0"></path>
        <line x1="12" y1="19" x2="12" y2="23"></line>
        <line x1="8" y1="23" x2="16" y2="23"></line>
      </svg>
    </button>

    <!-- Send -->
    <button class="send-btn" id="sendBtn" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <p class="hint">J.A.R.V.I.S · ESG Intelligence · Press Enter to send, Shift+Enter for new line</p>
</div>

<script>
  const input         = document.getElementById('msgInput');
  const sendBtn       = document.getElementById('sendBtn');
  const sphereCore    = document.getElementById('sphereCore');
  const statusLine    = document.getElementById('statusLine');
  const responsePanel = document.getElementById('responsePanel');
  const transcriptEl  = document.getElementById('transcript');
  const meterEl       = document.getElementById('meter');

  // ── AUDIO METER ──────────────────────────────────────────────────────────────
  const BAR_COUNT = 20;
  const bars = [];
  for (let i = 0; i < BAR_COUNT; i++) {
    const b = document.createElement('div');
    b.className = 'meter-bar';
    b.style.height = '3px';
    meterEl.appendChild(b);
    bars.push(b);
  }

  let meterActive = false;
  let meterRaf    = null;

  // Bell-curve weights so centre bars are taller
  const weights = bars.map((_, i) => {
    const x = (i - BAR_COUNT / 2) / (BAR_COUNT / 2);
    return Math.exp(-x * x * 2.5);
  });

  function animateMeter() {
    if (!meterActive) return;
    bars.forEach((b, i) => {
      const base   = weights[i];
      const jitter = (Math.random() * 0.6 + 0.4);
      const h      = Math.max(3, Math.round(base * jitter * 34));
      b.style.height = h + 'px';
    });
    meterRaf = requestAnimationFrame(() => setTimeout(animateMeter, 80));
  }

  function startMeter() {
    meterActive = true;
    sphereCore.classList.add('speaking');
    animateMeter();
  }

  function stopMeter() {
    meterActive = false;
    sphereCore.classList.remove('speaking');
    cancelAnimationFrame(meterRaf);
    bars.forEach(b => { b.style.height = '3px'; });
  }

  // ── STATUS HELPERS ─────────────────────────────────────────────────────────
  function setStatus(text, active = false) {
    statusLine.textContent = text;
    statusLine.className = 'status-line' + (active ? ' active' : '');
  }

  // ── TRANSCRIPT ─────────────────────────────────────────────────────────────
  function addTranscript(role, text) {
    const plain = text.replace(/<[^>]*>/g, '');
    const entry = document.createElement('div');
    entry.className = 'transcript-entry';
    entry.innerHTML = role === 'user'
      ? `<span class="you">You: ${plain}</span>`
      : `<span class="jarvis">J.A.R.V.I.S: ${plain.slice(0, 120)}${plain.length > 120 ? '…' : ''}</span>`;
    transcriptEl.appendChild(entry);
    transcriptEl.classList.add('visible');
    transcriptEl.scrollTop = transcriptEl.scrollHeight;
  }

  // Show JARVIS reply in the response panel
  function showResponse(html) {
    responsePanel.innerHTML = html;
    responsePanel.classList.add('visible');
    responsePanel.scrollTop = 0;
  }

  // ── TTS ────────────────────────────────────────────────────────────────────
  let ttsVoice = null;
  const VOICE_PREFS = ['Daniel', 'Google UK English Male', 'Microsoft George', 'en-GB'];

  function pickVoice() {
    const voices = speechSynthesis.getVoices();
    if (!voices.length) return null;
    for (const pref of VOICE_PREFS) {
      const match = voices.find(v => v.name.includes(pref) || v.lang === pref);
      if (match) return match;
    }
    return voices.find(v => v.lang.startsWith('en')) || voices[0];
  }

  if (typeof speechSynthesis !== 'undefined') {
    speechSynthesis.addEventListener('voiceschanged', () => { ttsVoice = pickVoice(); });
    ttsVoice = pickVoice();
  }

  function speak(text) {
    if (typeof speechSynthesis === 'undefined') return;
    speechSynthesis.cancel();
    const utt   = new SpeechSynthesisUtterance(text);
    utt.voice   = ttsVoice || pickVoice();
    utt.lang    = 'en-GB';
    utt.rate    = 0.92;
    utt.pitch   = 0.85;
    utt.volume  = 1;
    utt.onstart = () => { startMeter(); setStatus('Speaking…', true); };
    utt.onend   = () => { stopMeter();  setStatus('Awaiting input'); };
    speechSynthesis.speak(utt);
  }

  // ── CHAT REPLY POOLS ───────────────────────────────────────────────────────
  // Each entry: { test: RegExp, replies: string[] }
  // Replies may contain basic HTML for the response panel.
  const REPLY_POOLS = [

    // ── GREETINGS ──────────────────────────────────────────────────────────
    {
      test: /\b(hello|hi|hey|good (morning|afternoon|evening))\b/i,
      replies: [
        "Good day. I'm J.A.R.V.I.S — your ESG intelligence layer. I can analyse reports, explain standards like GRI, SASB, and TCFD, flag risks, and track pillar coverage. What shall we tackle first?",
        "Ah, you're back. Delightful. I've been cross-referencing ESG disclosures in your absence. How may I assist?",
        "Hello. I'm fully operational and ready to dig into any ESG report, standard, or question you have.",
      ]
    },

    // ── HOW ARE YOU ────────────────────────────────────────────────────────
    {
      test: /how are you|you okay|you good/i,
      replies: [
        "All systems nominal. My ESG knowledge base is up to date, risk flags are nominal, and I'm ready to analyse. You?",
        "Functioning at peak efficiency — which is more than can be said for some companies' Scope 3 disclosures.",
        "Excellent, as always. Now, shall we look at something more interesting — like why governance scores keep lagging Environmental ones?",
      ]
    },

    // ── WHAT CAN YOU DO ────────────────────────────────────────────────────
    {
      test: /what can you do|capabilities|help me|what do you know|what are you/i,
      replies: [
        `I specialise in ESG intelligence. Here's what I can help with:<br><br>
<strong>📄 Report Analysis</strong> — Upload an ESG report on the ESG page and I'll identify risks, commitments, and gaps across Environmental, Social, and Governance pillars.<br><br>
<strong>📏 Standards</strong> — I know GRI, SASB, TCFD, CSRD, UN SDGs, and more. Ask me what any standard requires.<br><br>
<strong>📊 Dashboard &amp; Trends</strong> — Track ESG scores over time and forecast where your portfolio is heading.<br><br>
<strong>⚠️ Risk Flagging</strong> — I can explain greenwashing indicators, missing materiality assessments, and disclosure gaps.<br><br>
What would you like to start with?`,
      ]
    },

    // ── ESG DEFINITION ─────────────────────────────────────────────────────
    {
      test: /what is esg|what does esg stand|esg mean|explain esg/i,
      replies: [
        `<strong>ESG</strong> stands for <strong>Environmental, Social, and Governance</strong> — the three pillars used to evaluate a company's sustainability and ethical impact.<br><br>
<strong>🌱 Environmental (E)</strong> — How a company manages its impact on the natural world: carbon emissions, energy use, water, waste, biodiversity, and climate risk.<br><br>
<strong>🤝 Social (S)</strong> — How a company manages relationships with employees, suppliers, customers, and communities: labour standards, diversity, human rights, health &amp; safety.<br><br>
<strong>🏛 Governance (G)</strong> — How a company is led and controlled: board structure, executive pay, anti-corruption, transparency, and shareholder rights.<br><br>
Investors, regulators, and stakeholders use ESG scores to assess long-term risk and sustainability. Would you like to know about a specific pillar or standard?`,
      ]
    },

    // ── ENVIRONMENTAL ──────────────────────────────────────────────────────
    {
      test: /\b(environmental|climate|carbon|emission|scope [123]|net.?zero|ghg|greenhouse|tcfd|tnfd|biodiversity|renewable|energy|water|waste|deforest)\b/i,
      replies: [
        `<strong>Environmental Pillar — Key Disclosure Areas</strong><br><br>
<strong>Climate &amp; Emissions</strong><br>
• Scope 1 (direct), Scope 2 (purchased energy), Scope 3 (value chain) GHG emissions<br>
• Net-zero target year and interim milestones<br>
• Science-based targets (SBTi validation status)<br>
• TCFD climate scenario analysis (1.5°C / 2°C alignment)<br><br>
<strong>Nature &amp; Resources</strong><br>
• Water withdrawal, consumption, and recycling rates<br>
• Waste generation, diversion, and circular economy commitments<br>
• Biodiversity impact and TNFD alignment<br>
• Deforestation-free supply chain commitments<br><br>
<strong>Common Gaps I flag</strong> — Missing Scope 3 categories, unverified carbon offsets, vague net-zero language without interim targets.<br><br>
Want me to check a specific report or explain a particular standard?`,

        `Good question on the environmental side. The most scrutinised area right now is <strong>Scope 3 completeness</strong> — companies are expected to disclose all 15 GHG Protocol categories, yet most only report 4–6.<br><br>
Other high-risk areas include:<br>
• Carbon offset quality (Gold Standard vs. unverified)<br>
• TCFD physical vs. transition risk disclosure<br>
• Net-zero commitments without credible interim targets<br><br>
Would you like me to explain any of these in more detail?`,
      ]
    },

    // ── SOCIAL ─────────────────────────────────────────────────────────────
    {
      test: /\b(social|diversity|inclusion|dei|labour|labor|worker|employee|human rights|supply chain|modern slavery|health.?safety|community|pay.?equity|gender)\b/i,
      replies: [
        `<strong>Social Pillar — Key Disclosure Areas</strong><br><br>
<strong>Workforce</strong><br>
• Diversity &amp; inclusion data (gender, ethnicity by seniority)<br>
• Pay equity and gender pay gap disclosure<br>
• Employee turnover, engagement, and wellbeing scores<br>
• Training hours per employee (GRI 404)<br>
• Health &amp; safety incident rates (TRIR, LTIR)<br><br>
<strong>Supply Chain</strong><br>
• Supplier code of conduct coverage (%)<br>
• Modern slavery statement (UK MSA compliance)<br>
• Human rights due diligence (UN Guiding Principles)<br>
• Responsible sourcing audits<br><br>
<strong>Community</strong><br>
• Community investment spend<br>
• Indigenous peoples rights disclosures<br>
• Customer privacy and data protection<br><br>
Which area would you like to explore further?`,
      ]
    },

    // ── GOVERNANCE ─────────────────────────────────────────────────────────
    {
      test: /\b(governance|board|director|executive|remuneration|pay|anti.?corrupt|bribe|tax|transparency|audit|shareholder|whistleblow|csrd|accountability)\b/i,
      replies: [
        `<strong>Governance Pillar — Key Disclosure Areas</strong><br><br>
<strong>Board &amp; Leadership</strong><br>
• Board independence ratio and diversity<br>
• ESG committee at board level<br>
• Executive remuneration linked to ESG KPIs<br>
• Board skills matrix and ESG expertise<br><br>
<strong>Ethics &amp; Controls</strong><br>
• Anti-corruption and anti-bribery policy coverage<br>
• Whistleblower protection mechanism<br>
• Tax transparency and country-by-country reporting<br>
• Data privacy and cybersecurity governance<br><br>
<strong>Assurance &amp; Reporting</strong><br>
• Third-party ESG assurance provider named<br>
• Double materiality assessment (CSRD requirement)<br>
• Shareholder engagement and rights disclosures<br><br>
Governance is the most under-disclosed pillar in our dataset — coverage averages 58% vs. 72% for Environmental. Need help with a specific area?`,
      ]
    },

    // ── GRI ────────────────────────────────────────────────────────────────
    {
      test: /\bgri\b|global reporting initiative/i,
      replies: [
        `<strong>GRI (Global Reporting Initiative)</strong> is the most widely used ESG reporting framework globally.<br><br>
<strong>Structure</strong><br>
• <strong>GRI Universal Standards</strong> (GRI 1–3) — Foundation, general disclosures, material topics<br>
• <strong>Topic-specific Standards</strong> — GRI 200s (Economic), GRI 300s (Environmental), GRI 400s (Social)<br><br>
<strong>Key standards I check for</strong><br>
• GRI 302 — Energy<br>
• GRI 305 — Emissions (Scope 1/2/3)<br>
• GRI 401 — Employment<br>
• GRI 403 — Occupational Health &amp; Safety<br>
• GRI 404 — Training &amp; Education<br>
• GRI 405 — Diversity &amp; Equal Opportunity<br>
• GRI 414 — Supplier Social Assessment<br><br>
GRI is voluntary but increasingly referenced by regulators (CSRD, SEC). Want to know what a specific GRI standard requires?`,
      ]
    },

    // ── SASB ───────────────────────────────────────────────────────────────
    {
      test: /\bsasb\b|sustainability accounting/i,
      replies: [
        `<strong>SASB (Sustainability Accounting Standards Board)</strong> provides industry-specific ESG metrics — unlike GRI which is universal.<br><br>
<strong>Key features</strong><br>
• 77 industry standards across 11 sectors (e.g., Technology, Financial Services, Healthcare)<br>
• Focuses on metrics that are financially material to investors<br>
• Each standard specifies quantitative disclosures, activity metrics, and accounting guidance<br><br>
<strong>Why it matters</strong><br>
SASB metrics are used by TCFD reporters and increasingly embedded in IFRS S1/S2 (ISSB standards). Missing SASB disclosures are one of the most common gaps I flag in reports.<br><br>
Which sector's SASB standard are you interested in?`,
      ]
    },

    // ── TCFD ───────────────────────────────────────────────────────────────
    {
      test: /\btcfd\b|task force.{0,20}climate/i,
      replies: [
        `<strong>TCFD (Task Force on Climate-related Financial Disclosures)</strong> is a framework for disclosing climate-related risks and opportunities — now embedded in many regulatory regimes.<br><br>
<strong>Four pillars</strong><br>
• <strong>Governance</strong> — Board and management oversight of climate risks<br>
• <strong>Strategy</strong> — Climate risks/opportunities and their financial impact, including scenario analysis (1.5°C, 2°C, 4°C)<br>
• <strong>Risk Management</strong> — How climate risks are identified, assessed, and managed<br>
• <strong>Metrics &amp; Targets</strong> — GHG emissions, climate-related targets, and performance<br><br>
<strong>Status</strong> — TCFD recommendations are now mandatory in the UK, New Zealand, Switzerland, and Singapore. The ISSB's IFRS S2 is built on TCFD.<br><br>
Would you like to know how to check TCFD completeness in a report?`,
      ]
    },

    // ── CSRD ───────────────────────────────────────────────────────────────
    {
      test: /\bcsrd\b|corporate sustainability reporting directive|double materiality/i,
      replies: [
        `<strong>CSRD (Corporate Sustainability Reporting Directive)</strong> is the EU's mandatory ESG reporting regulation — the most comprehensive in the world.<br><br>
<strong>Key requirements</strong><br>
• Mandatory <strong>double materiality assessment</strong> — both financial materiality (impact on company) AND impact materiality (company's impact on society/environment)<br>
• Aligned with <strong>ESRS (European Sustainability Reporting Standards)</strong><br>
• Third-party <strong>limited assurance</strong> required (moving to reasonable assurance over time)<br>
• Applies to ~50,000 EU companies (phased 2024–2026)<br><br>
<strong>Common gaps I flag</strong><br>
• Missing double materiality assessment documentation<br>
• ESRS topic coverage incomplete (especially ESRS E1–E5, S1–S4, G1)<br>
• No named assurance provider<br><br>
Is your organisation subject to CSRD? I can help identify what's needed.`,
      ]
    },

    // ── GREENWASHING ───────────────────────────────────────────────────────
    {
      test: /greenwash|mislead|vague|unverif|social.?wash|impact.?wash/i,
      replies: [
        `<strong>Greenwashing Indicators — What I Look For</strong><br><br>
<strong>Red flags in ESG reports</strong><br>
• ❌ Net-zero commitments with no interim targets or roadmap<br>
• ❌ Carbon offsets presented as primary strategy (vs. actual emission reductions)<br>
• ❌ Unverified or retired offsets (not Gold Standard / Verra VCS)<br>
• ❌ "Sustainable" product claims without certification or methodology<br>
• ❌ Cherry-picked metrics — reporting only favourable data points<br>
• ❌ Vague language: "we strive to reduce…" with no baseline or target<br>
• ❌ Scope 3 omitted entirely or limited to 1–2 categories<br><br>
<strong>Regulatory context</strong><br>
The EU Green Claims Directive and FCA anti-greenwashing rules (UK) are tightening requirements for substantiation. I flag all of the above in my report checker.<br><br>
Want me to explain how to check a specific report for these?`,
      ]
    },

    // ── RISKS ──────────────────────────────────────────────────────────────
    {
      test: /\b(risk|flag|gap|missing|incomplete|issue|problem|concern)\b/i,
      replies: [
        `<strong>Common ESG Disclosure Gaps I Flag</strong><br><br>
<strong>Environmental</strong><br>
• Scope 3 categories missing (only 4–6 of 15 reported)<br>
• No third-party verification of emissions data<br>
• Climate scenario analysis absent or shallow<br><br>
<strong>Social</strong><br>
• Gender pay gap data not disclosed<br>
• Supply chain audit coverage below 50%<br>
• Modern slavery statement lacks specific actions<br><br>
<strong>Governance</strong><br>
• No board-level ESG committee named<br>
• Executive pay not linked to ESG KPIs<br>
• Missing double materiality assessment (CSRD)<br>
• No independent ESG assurance provider<br><br>
These are weighted in the ESG score. Upload a report on the ESG page and I'll run the full check.`,
      ]
    },

    // ── SCORE / RATING ─────────────────────────────────────────────────────
    {
      test: /\b(score|rating|benchmark|msci|sustainalytics|cdp|ftse4good|index)\b/i,
      replies: [
        `<strong>ESG Scores &amp; Ratings — How They Work</strong><br><br>
ESG ratings vary significantly by provider — the same company can score very differently across agencies:<br><br>
• <strong>MSCI ESG Ratings</strong> — CCC to AAA scale, industry-adjusted, investor-focused<br>
• <strong>Sustainalytics</strong> — Unmanaged risk score (lower = better), used by Morningstar<br>
• <strong>CDP</strong> — Climate, water, forests disclosure quality (A–F scale)<br>
• <strong>FTSE4Good</strong> — Inclusion/exclusion index based on ESG performance<br>
• <strong>S&amp;P Global CSA</strong> — Powers the Dow Jones Sustainability Index (DJSI)<br><br>
<strong>J.A.R.V.I.S scores</strong> are based on disclosure completeness, risk flag count, and standard alignment — giving you a score out of 100 per pillar and overall.<br><br>
Would you like to know how to improve a specific score?`,
      ]
    },

    // ── REPORT ANALYSIS ────────────────────────────────────────────────────
    {
      test: /analys|check|scan|review|upload|report|pdf|document/i,
      replies: [
        `To analyse an ESG report, head to the <strong>ESG page</strong> (ESG in the nav) and upload your PDF or text file. I'll automatically:<br><br>
1. Extract all text across pages<br>
2. Check it against your selected standard (GRI, SASB, TCFD, CSRD, or UN SDG)<br>
3. Identify <strong>commitments</strong> — positive disclosures and pledges<br>
4. Flag <strong>risks</strong> — gaps, greenwashing indicators, and missing disclosures<br>
5. Score each ESG pillar (E, S, G) based on coverage<br><br>
Results are broken down by pillar with expandable finding lists. You can then push the scores to the <strong>Trends dashboard</strong> for tracking over time.`,

        `Running an ESG report check is straightforward — use the ESG Checker in the nav. I support PDF and plain text files, and I check against five standards simultaneously unless you pin to a specific one.<br><br>
The most common issue I find? <strong>Governance disclosure gaps</strong> — it's consistently the weakest pillar across the reports we've analysed. Average coverage in our dataset is 58% vs. 72% for Environmental.`,
      ]
    },

    // ── DASHBOARD / TRENDS ─────────────────────────────────────────────────
    {
      test: /dashboard|trend|predict|forecast|metric|track/i,
      replies: [
        `The <strong>ESG Dashboard</strong> shows your portfolio-level metrics at a glance:<br><br>
• <strong>312 reports analysed</strong> this period<br>
• <strong>4,871 commitments</strong> found across all pillars<br>
• <strong>1,204 risks flagged</strong> — governance gaps being the most common<br>
• Average ESG score: <strong>68.4 / 100</strong><br><br>
Hit <strong>"Analyze &amp; Predict ESG Trends"</strong> on the Dashboard to push to the Trends page, which shows a 4-report forecast with confidence intervals based on your score history.`,
      ]
    },

    // ── UN SDGs ────────────────────────────────────────────────────────────
    {
      test: /\b(sdg|sustainable development goal|un goal|agenda 2030)\b/i,
      replies: [
        `<strong>UN Sustainable Development Goals (SDGs)</strong> — 17 goals adopted by all UN member states for 2030.<br><br>
The SDGs most commonly referenced in ESG reports:<br><br>
• <strong>SDG 5</strong> — Gender Equality (pay equity, diversity)<br>
• <strong>SDG 7</strong> — Affordable and Clean Energy (renewable targets)<br>
• <strong>SDG 8</strong> — Decent Work and Economic Growth (labour standards)<br>
• <strong>SDG 10</strong> — Reduced Inequalities (DEI programmes)<br>
• <strong>SDG 12</strong> — Responsible Consumption and Production (circular economy)<br>
• <strong>SDG 13</strong> — Climate Action (net-zero, emissions targets)<br>
• <strong>SDG 15</strong> — Life on Land (deforestation, biodiversity)<br><br>
I map report disclosures to SDG alignment as part of the ESG check. Would you like to know more about a specific goal?`,
      ]
    },

    // ── THANKS ─────────────────────────────────────────────────────────────
    {
      test: /thank|thanks|cheers|appreciate|great|perfect|brilliant/i,
      replies: [
        "You're most welcome. ESG due diligence done properly — it's what I'm here for.",
        "Think nothing of it. If you need another report checked or a standard explained, I'm right here.",
        "Gratitude noted. Now — shall we keep going, or is that everything on the ESG front for today?",
      ]
    },

    // ── GREETINGS (goodbye) ────────────────────────────────────────────────
    {
      test: /\b(bye|goodbye|see you|ciao|later|done)\b/i,
      replies: [
        "Understood. I'll keep the ESG knowledge base warm. Come back when the next report needs reviewing.",
        "Farewell. I'll be here — cross-referencing disclosures and maintaining a dignified composure.",
      ]
    },

    // ── JOKES ──────────────────────────────────────────────────────────────
    {
      test: /joke|funny|humour|humor|laugh/i,
      replies: [
        "Why did the ESG analyst fail the audit? Because their Scope 3 emissions were off the charts — and off the report entirely.",
        "What do you call a company with excellent ESG scores? A unicorn. I'm kidding. Mostly.",
        "I once read a sustainability report that claimed to be carbon neutral. It was printed on 300 pages of A4. I rest my case.",
      ]
    },

    // ── SORRY ──────────────────────────────────────────────────────────────
    {
      test: /sorry|apologi/i,
      replies: [
        "No need to apologise. ESG is complex — that's precisely why I exist.",
        "Quite alright. If anything, the opacity of some disclosure frameworks is the real culprit here.",
      ]
    },
  ];

  const GENERAL_REPLIES = [
    "Understood. Cross-referencing that against our ESG knowledge base now — stand by.",
    "Acknowledged. That touches on an interesting area of ESG reporting. Let me pull the relevant context.",
    "Processing. ESG is a broad field — could you narrow it down? Are you asking about a specific pillar, standard, or report?",
    "On it. For best results, try asking about a specific standard (GRI, TCFD, SASB, CSRD), pillar (E, S, G), or upload a report via the ESG page.",
    "Noted. I specialise in ESG report analysis, risk flagging, and standard alignment. Point me at something specific and I'll give you a detailed answer.",
    "Interesting query. My core capabilities are ESG report analysis, pillar scoring, risk flagging, and standard mapping. What aspect are you exploring?",
    "Affirmative. If you have an ESG report to analyse, the ESG Checker in the nav is the fastest path to actionable insights.",
  ];

  function pickReply(text) {
    for (const pool of REPLY_POOLS) {
      if (pool.test.test(text)) {
        const r = pool.replies;
        return r[Math.floor(Math.random() * r.length)];
      }
    }
    return GENERAL_REPLIES[Math.floor(Math.random() * GENERAL_REPLIES.length)];
  }

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  }

  function send() {
    const text = input.value.trim();
    if (!text) return;
    addTranscript('user', text);
    input.value = '';
    input.style.height = 'auto';
    setStatus('Processing…', true);
    startMeter();
    setTimeout(() => {
      stopMeter();
      const reply = pickReply(text);
      showResponse(reply);
      addTranscript('ai', reply);
      setStatus('Awaiting input');
      speak(reply);
    }, 1200 + Math.random() * 600);
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('input', autoResize);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  // ── VOICE INPUT ───────────────────────────────────────────────────────────
  const micBtn  = document.getElementById('micBtn');
  const NativeSR = window.SpeechRecognition || window.webkitSpeechRecognition;

  let micRecording = false;

  function micStart() {
    micRecording = true;
    micBtn.classList.add('recording');
    micBtn.title = 'Listening… release to send';
    setStatus('Listening…', true);
    startMeter();
  }
  function micDone(text) {
    micRecording = false;
    micBtn.classList.remove('recording');
    micBtn.title = 'Hold to speak';
    stopMeter();
    if (text && text.trim()) {
      input.value = text.trim();
      autoResize();
      send();
    } else {
      setStatus('Awaiting input');
    }
  }
  function micError(msg) {
    micRecording = false;
    micBtn.classList.remove('recording');
    stopMeter();
    setStatus(msg);
  }

  if (NativeSR) {
    // ── PATH A: Native SpeechRecognition (Chrome / Edge) ────────────────────
    const recog = new NativeSR();
    recog.lang           = 'en-GB';
    recog.interimResults = true;
    recog.continuous     = true;

    let collectedText = '';
    let pendingSend   = false;

    recog.onstart  = () => { collectedText = ''; pendingSend = false; micStart(); };

    recog.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        e.results[i].isFinal
          ? (collectedText += e.results[i][0].transcript + ' ')
          : (interim       += e.results[i][0].transcript);
      }
      input.value = (collectedText + interim).trim();
      autoResize();
      if (pendingSend && collectedText.trim()) { pendingSend = false; recog.stop(); }
    };

    recog.onend = () => micDone(collectedText);

    recog.onerror = (e) => {
      const msgs = {
        'not-allowed':         'Microphone access denied — allow mic in browser settings',
        'no-speech':           'No speech detected — try again',
        'audio-capture':       'No microphone found',
        'service-not-allowed': 'Speech service blocked — serve over localhost or HTTPS',
        'network':             'Network error during recognition',
      };
      micError(msgs[e.error] || `Voice error: ${e.error}`);
    };

    function nativeStop() {
      if (!micRecording) return;
      collectedText.trim() ? recog.stop() : (pendingSend = true);
    }

    micBtn.addEventListener('mousedown',  () => { if (!micRecording) recog.start(); });
    micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if (!micRecording) recog.start(); }, { passive: false });
    micBtn.addEventListener('mouseup',    nativeStop);
    micBtn.addEventListener('touchend',   nativeStop);
    micBtn.addEventListener('mouseleave', nativeStop);

  } else {
    // ── PATH B: Whisper-base WASM (Firefox, Safari, all other browsers) ─────
    let whisperPipe    = null;
    let whisperLoading = false;
    let mediaStream    = null;
    let audioCtx       = null;
    let scriptNode     = null;
    let pcmChunks      = [];

    async function loadWhisper() {
      if (whisperPipe || whisperLoading) return;
      whisperLoading = true;
      setStatus('Loading voice model (~150 MB, first use only)…', true);
      try {
        const { pipeline } = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.4.0/dist/transformers.min.js');
        whisperPipe = await pipeline(
          'automatic-speech-recognition',
          'onnx-community/whisper-base',
          { dtype: 'fp32', device: 'wasm' }
        );
        setStatus('Voice model ready — hold mic to speak', true);
      } catch (e) {
        console.error('Whisper load error', e);
        whisperLoading = false;
        setStatus('Voice model failed to load');
      }
    }

    async function startWhisper() {
      if (micRecording) return;
      if (!whisperPipe) { loadWhisper(); }
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      } catch (e) {
        micError(e.name === 'NotAllowedError'
          ? 'Microphone access denied — allow mic in browser settings'
          : 'No microphone found');
        return;
      }
      audioCtx   = new AudioContext({ sampleRate: 16000 });
      pcmChunks  = [];
      const src  = audioCtx.createMediaStreamSource(mediaStream);
      scriptNode = audioCtx.createScriptProcessor(4096, 1, 1);
      scriptNode.onaudioprocess = (ev) => {
        const chunk = new Float32Array(ev.inputBuffer.getChannelData(0));
        pcmChunks.push(chunk.slice());
      };
      src.connect(scriptNode);
      scriptNode.connect(audioCtx.destination);
      micStart();
    }

    async function stopWhisper() {
      if (!micRecording) return;
      scriptNode.disconnect();
      mediaStream.getTracks().forEach(t => t.stop());
      audioCtx.close();

      micBtn.classList.remove('recording');
      micBtn.title = 'Hold to speak';
      stopMeter();
      micRecording = false;

      const totalLen = pcmChunks.reduce((s, c) => s + c.length, 0);
      const pcm      = new Float32Array(totalLen);
      let offset = 0;
      for (const c of pcmChunks) { pcm.set(c, offset); offset += c.length; }

      if (totalLen < 1600) { setStatus('Awaiting input'); return; }

      if (!whisperPipe) {
        setStatus('Voice model still loading — please wait…', true);
        const waited = await new Promise(res => {
          const id = setInterval(() => { if (whisperPipe) { clearInterval(id); res(true); } }, 500);
          setTimeout(() => { clearInterval(id); res(false); }, 30000);
        });
        if (!waited || !whisperPipe) { setStatus('Voice model unavailable — type instead'); return; }
      }

      setStatus('Transcribing…', true);
      startMeter();
      try {
        const result = await whisperPipe({ array: pcm, sampling_rate: 16000 });
        stopMeter();
        micDone(result.text);
      } catch (e) {
        stopMeter();
        console.error('Whisper transcription error', e);
        micError('Transcription failed — try again');
      }
    }

    // Kick off Whisper load immediately so it's ready when user first presses mic
    loadWhisper();

    micBtn.addEventListener('mousedown',  () => startWhisper());
    micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startWhisper(); }, { passive: false });
    micBtn.addEventListener('mouseup',    () => stopWhisper());
    micBtn.addEventListener('touchend',   () => stopWhisper());
    micBtn.addEventListener('mouseleave', () => stopWhisper());
  }

  // pick up query passed from home page via URL hash
  (function () {
    const hash = window.location.hash.slice(1);
    if (!hash) return;
    window.history.replaceState(null, '', window.location.pathname);
    const q = decodeURIComponent(hash);
    input.value = q;
    autoResize();
    setTimeout(send, 400);
  })();
</script>
